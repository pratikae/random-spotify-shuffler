server {
    listen 80;
    server_name protify-shuffle.com www.protify-shuffle.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name protify-shuffle.com www.protify-shuffle.com;

    ssl_certificate /etc/letsencrypt/live/protify-shuffle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/protify-shuffle.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
